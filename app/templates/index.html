<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDS IA - CICIDS2017</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
      textarea { width: 100%; min-height: 240px; font-family: monospace; }
      button { padding: 0.7rem 1rem; cursor: pointer; margin-top: 0.8rem; }
      pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Détection d'intrusions réseau (CICIDS2017)</h1>
    <p>Colle un JSON de features puis clique sur <strong>Prédire</strong>.</p>

    <textarea id="payload">
{
  "Destination Port": 443,
  "Flow Duration": 1200,
  "Total Fwd Packets": 10,
  "Total Backward Packets": 8,
  "Flow Bytes/s": 23000,
  "Flow Packets/s": 15
}
    </textarea>

    <button onclick="runPredict()">Prédire</button>

    <h2>Résultat</h2>
    <pre id="out">Aucun résultat.</pre>

    <script>
      async function runPredict() {
        const output = document.getElementById("out");
        try {
          const payload = JSON.parse(document.getElementById("payload").value);
          const res = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          output.textContent = `Erreur: ${err.message}`;
        }
      }
    </script>
  </body>
</html>
